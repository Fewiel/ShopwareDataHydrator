name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: ShopwareDataHydrator-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact: ShopwareDataHydrator-win-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: ShopwareDataHydrator-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o publish

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv publish/ShopwareDataHydrator publish/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv publish/ShopwareDataHydrator.exe publish/${{ matrix.artifact }}.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}.exe

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/ShopwareDataHydrator-linux-x64/ShopwareDataHydrator-linux-x64
            artifacts/ShopwareDataHydrator-win-x64/ShopwareDataHydrator-win-x64.exe
            artifacts/ShopwareDataHydrator-osx-arm64/ShopwareDataHydrator-osx-arm64
